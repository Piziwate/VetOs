services:
  db:
    image: postgres:16-alpine
    container_name: vetos-db
    restart: always
    environment:
      POSTGRES_USER: vetos_user
      POSTGRES_PASSWORD: vetos_password
      POSTGRES_DB: vetos_db
    ports:
      - "5432:5432"
    volumes:
      - vetos_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vetos-redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: vetos-adminer
    restart: always
    ports:
      - "8080:8080"

  # Backend and Frontend placeholders - to be built in subsequent steps
  # backend:
  #   build: ./backend
  #   volumes:
  #     - ./backend:/app
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db
  #     - redis

  # frontend:
  #   build: ./frontend
  #   volumes:
  #     - ./frontend:/app
  #   ports:
  #     - "3000:3000"

volumes:
  vetos_postgres_data:
