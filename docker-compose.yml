services:
  db:
    image: postgres:16-alpine
    container_name: vetos-db
    restart: always
    environment:
      POSTGRES_USER: vetos_user
      POSTGRES_PASSWORD: vetos_password
      POSTGRES_DB: vetos_db
    ports:
      - "5432:5432"
    volumes:
      - vetos_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vetos-redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: vetos-adminer
    restart: always
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    container_name: vetos-backend
    restart: always
    environment:
      VETOS_POSTGRES_URL: postgresql+asyncpg://vetos_user:vetos_password@db:5432/vetos_db
      VETOS_SECRET_KEY: ${VETOS_SECRET_KEY:-DEVELOPMENT_SECRET_KEY_CHANGE_IN_PROD}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: vetos-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  vetos_postgres_data:
